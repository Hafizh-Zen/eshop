<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg p-4">
                <h3 class="text-center mb-4">Edit Product</h3>
                <form th:action="@{/product/edit}" th:object="${product}" method="post">
                    <!-- Hidden field for productId -->
                    <input type="hidden" th:field="*{productId}" />

                    <div class="mb-3">
                        <label for="nameInput" class="form-label">Product Name</label>
                        <input th:field="*{productName}" type="text" class="form-control" id="nameInput" placeholder="Enter product name">
                    </div>

                    <div class="mb-3">
                        <label for="quantityInput" class="form-label">Quantity</label>
                        <input th:field="*{productQuantity}" type="number" class="form-control" id="quantityInput" placeholder="Enter product quantity">
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="/product/list" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
